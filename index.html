<!DOCTYPE html>
<html>
<head>
    <title>Smart Classroom Dashboard</title>
</head>
<body>
    <h1>Real-Time Classroom Data</h1>
    <div id="data"></div>

    <script>
        async function fetchData() {
            const res = await fetch('http://127.0.0.1:5000/data');
            const data = await res.json();
            document.getElementById('data').innerHTML = `
                Temp: ${data.temperature} °C <br>
                Humidity: ${data.humidity}% <br>
                Air Quality: ${data.air_quality} ppm <br>
                Noise: ${data.noise} dB
            `;
        }
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
